# 운영 환경 전용 설정. 실행 시 프로필을 활성화해야 적용됨:
#   --spring.profiles.active=prod   또는   환경변수 SPRING_PROFILES_ACTIVE=prod
# application.properties 값을 덮어쓰는 방식이라, 여기 없는 값은 그대로 상속됨.

# TODO: 실제 프론트엔드 배포 도메인으로 교체 (여러 개면 콤마로 구분)
cors.allowed-origins=https://TODO-domain.example.com

# TODO: 메뉴 이미지 URL에 붙는 호스트 - 실제 백엔드 도메인으로 교체
app.base-url=https://TODO-domain.example.com

# 리눅스 컨테이너 기준 업로드 경로 (Dockerfile에서 이 경로로 볼륨 마운트 예정)
app.upload.dir=/app/uploads/menu_picts/

# HTTPS 환경이므로 Refresh Token 쿠키에 Secure 속성 필요 (http면 브라우저가 쿠키 자체를 버림)
app.cookie.secure=true

# 운영에서는 API 스펙 전체 공개 차단
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
